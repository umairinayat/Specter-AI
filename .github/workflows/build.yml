name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─── Type Check ────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ─── Build: Windows ────────────────────────────────────
  build-windows:
    needs: typecheck
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-win-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-win-
      - run: npm ci
      - run: npm run build
      - name: Build Windows portable
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: specter-ai-windows
          path: |
            dist/*.exe
          retention-days: 30

  # ─── Build: macOS ──────────────────────────────────────
  build-macos:
    needs: typecheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-mac-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-mac-
      - run: npm ci
      - run: npm run build
      # Use --mac zip to skip DMG — hdiutil detach fails on GitHub Actions runners
      - name: Build macOS app
        run: npx electron-builder --mac zip --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: specter-ai-macos
          path: |
            dist/*.zip
          retention-days: 30

  # ─── Build: Linux ──────────────────────────────────────
  build-linux:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-linux-
      - run: npm ci
      - run: npm run build
      - name: Build Linux packages
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false
      - uses: actions/upload-artifact@v4
        with:
          name: specter-ai-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  # ─── Release (on tag push only) ────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: specter-ai-windows
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: specter-ai-macos
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: specter-ai-linux
          path: release-artifacts

      - name: List release artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --draft \
            --generate-notes \
            --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
